<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Pro MZ — Aprende JavaScript em Moçambique</title>
<meta name="description" content="A plataforma número 1 de aprendizagem de JavaScript em Moçambique. Aprende com exercícios práticos, quizzes e projectos reais.">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --black:#050507;
  --dark:#0c0c10;
  --card:#111118;
  --border:#1c1c28;
  --yellow:#f7df1e;
  --yellow-dim:#c9b800;
  --white:#f0f0f8;
  --muted:#6b6b80;
  --green:#22c55e;
  --blue:#38bdf8;
  --code:#0a0a0e;
}
html{scroll-behavior:smooth;}
body{
  background:var(--black);
  color:var(--white);
  font-family:'Segoe UI',system-ui,sans-serif;
  line-height:1.6;
  overflow-x:hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--yellow);border-radius:2px;}

/* ═══════════════════════════════
   NAVBAR
═══════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(5,5,7,0.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.nav-inner{
  max-width:1100px;margin:0 auto;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 20px;height:64px;
}
.nav-logo{
  font-size:22px;font-weight:800;letter-spacing:-0.5px;
  text-decoration:none;
}
.nav-logo .js{color:var(--yellow);}
.nav-logo .rest{color:var(--white);}
.nav-links{display:flex;align-items:center;gap:8px;}
.nav-link{
  color:var(--muted);font-size:14px;font-weight:500;
  text-decoration:none;padding:8px 14px;border-radius:8px;
  transition:all 0.2s;
}
.nav-link:hover{color:var(--white);background:var(--card);}
.nav-cta{
  background:var(--yellow);color:#000;
  font-size:14px;font-weight:700;
  padding:9px 20px;border-radius:8px;
  border:none;cursor:pointer;
  font-family:inherit;
  transition:opacity 0.2s,transform 0.1s;
}
.nav-cta:hover{opacity:0.88;}
.nav-cta:active{transform:scale(0.97);}

/* ═══════════════════════════════
   HERO
═══════════════════════════════ */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;justify-content:center;
  padding:100px 20px 60px;
  max-width:700px;margin:0 auto;
  position:relative;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(247,223,30,0.08);
  border:1px solid rgba(247,223,30,0.2);
  border-radius:100px;
  padding:6px 14px;font-size:12px;
  color:var(--yellow);letter-spacing:1.5px;
  text-transform:uppercase;font-weight:600;
  margin-bottom:28px;width:fit-content;
}
.hero-eyebrow::before{
  content:'';width:6px;height:6px;
  background:var(--yellow);border-radius:50%;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
.hero h1{
  font-size:clamp(40px,8vw,72px);
  font-weight:800;line-height:1.05;
  letter-spacing:-2px;
  margin-bottom:24px;
}
.hero h1 .accent{
  color:var(--yellow);
  position:relative;display:inline-block;
}
.hero h1 .accent::after{
  content:'';
  position:absolute;bottom:-4px;left:0;right:0;
  height:3px;background:var(--yellow);
  border-radius:2px;opacity:0.4;
}
.hero-desc{
  font-size:18px;color:var(--muted);
  max-width:560px;margin-bottom:40px;line-height:1.7;
}
.hero-desc strong{color:var(--white);}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:60px;}
.btn-primary{
  background:var(--yellow);color:#000;
  font-size:15px;font-weight:700;
  padding:14px 28px;border-radius:10px;
  border:none;cursor:pointer;font-family:inherit;
  transition:all 0.2s;letter-spacing:0.3px;
}
.btn-primary:hover{opacity:0.88;transform:translateY(-1px);}
.btn-secondary{
  background:transparent;color:var(--white);
  font-size:15px;font-weight:600;
  padding:14px 28px;border-radius:10px;
  border:1px solid var(--border);cursor:pointer;
  font-family:inherit;transition:all 0.2s;
}
.btn-secondary:hover{border-color:var(--yellow);color:var(--yellow);}

/* HERO STATS */
.hero-stats{
  display:flex;gap:0;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  width:fit-content;
}
.hstat{
  padding:20px 28px;
  border-right:1px solid var(--border);
}
.hstat:last-child{border-right:none;}
.hstat-n{
  font-size:28px;font-weight:800;
  color:var(--yellow);letter-spacing:-1px;
  font-variant-numeric:tabular-nums;
}
.hstat-l{font-size:12px;color:var(--muted);margin-top:2px;letter-spacing:0.5px;}

/* BG GRID */
.hero::before{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:
    linear-gradient(rgba(247,223,30,0.025) 1px, transparent 1px),
    linear-gradient(90deg,rgba(247,223,30,0.025) 1px, transparent 1px);
  background-size:64px 64px;
  pointer-events:none;z-index:-1;
}

/* ═══════════════════════════════
   SECTIONS
═══════════════════════════════ */
.section{padding:100px 20px;max-width:1100px;margin:0 auto;}
.section-label{
  font-size:11px;letter-spacing:4px;text-transform:uppercase;
  color:var(--yellow);margin-bottom:12px;font-weight:600;
}
.section-title{
  font-size:clamp(28px,5vw,46px);font-weight:800;
  letter-spacing:-1.5px;line-height:1.1;margin-bottom:16px;
}
.section-desc{font-size:16px;color:var(--muted);max-width:520px;line-height:1.7;}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:0 20px;}

/* ═══════════════════════════════
   CODE WINDOW
═══════════════════════════════ */
.code-window{
  background:var(--code);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  margin-top:48px;
  box-shadow:0 32px 80px rgba(0,0,0,0.5);
}
.code-titlebar{
  background:#111116;border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:8px;
}
.dot{width:12px;height:12px;border-radius:50%;}
.dot-r{background:#ff5f57;}.dot-y{background:#febc2e;}.dot-g{background:#28c840;}
.code-filename{font-size:12px;color:var(--muted);margin-left:10px;font-family:'Courier New',monospace;}
.code-body{padding:24px;font-family:'Courier New',monospace;font-size:14px;line-height:1.8;overflow-x:auto;}
.kw{color:#c084fc;}.fn{color:#38bdf8;}.str{color:#86efac;}
.num{color:#f7df1e;}.cm{color:#334155;}.op{color:#f97316;}
.var{color:#f0f0f8;}
.line{display:block;}
.cursor-blink{
  display:inline-block;width:2px;height:15px;
  background:var(--yellow);vertical-align:middle;margin-left:2px;
  animation:blink 1.1s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ═══════════════════════════════
   FEATURES GRID
═══════════════════════════════ */
.features-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:2px;margin-top:60px;
  border:1px solid var(--border);border-radius:16px;overflow:hidden;
}
.feat{
  background:var(--card);padding:36px 32px;
  transition:background 0.2s;
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.feat:hover{background:#141420;}
.feat-icon{
  width:48px;height:48px;border-radius:12px;
  background:rgba(247,223,30,0.08);border:1px solid rgba(247,223,30,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin-bottom:20px;
}
.feat h3{font-size:17px;font-weight:700;margin-bottom:8px;letter-spacing:-0.3px;}
.feat p{font-size:14px;color:var(--muted);line-height:1.6;}

/* ═══════════════════════════════
   CURRICULUM
═══════════════════════════════ */
.curriculum{margin-top:60px;display:flex;flex-direction:column;gap:2px;}
.module{
  background:var(--card);border:1px solid var(--border);
  border-radius:0;padding:0;overflow:hidden;
  transition:border-color 0.2s;
}
.module:first-child{border-radius:14px 14px 0 0;}
.module:last-child{border-radius:0 0 14px 14px;}
.module:hover{border-color:#2c2c3c;}
.module-header{
  padding:22px 24px;display:flex;align-items:center;
  gap:16px;cursor:pointer;
}
.module-num{
  width:36px;height:36px;border-radius:8px;
  font-size:13px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-variant-numeric:tabular-nums;
}
.mn-1{background:rgba(247,223,30,0.12);color:var(--yellow);}
.mn-2{background:rgba(56,189,248,0.12);color:var(--blue);}
.mn-3{background:rgba(34,197,94,0.12);color:var(--green);}
.mn-4{background:rgba(249,115,22,0.12);color:#f97316;}
.mn-5{background:rgba(168,85,247,0.12);color:#a855f7;}
.mn-6{background:rgba(236,72,153,0.12);color:#ec4899;}
.module-info{flex:1;}
.module-title{font-size:16px;font-weight:700;margin-bottom:3px;}
.module-sub{font-size:13px;color:var(--muted);}
.module-tag{
  font-size:11px;font-weight:700;padding:4px 10px;
  border-radius:6px;letter-spacing:1px;flex-shrink:0;
}
.tag-free{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.tag-pro{background:rgba(247,223,30,0.1);color:var(--yellow);border:1px solid rgba(247,223,30,0.2);}

/* ═══════════════════════════════
   PRICING
═══════════════════════════════ */
.pricing-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px;margin-top:60px;max-width:700px;
}
@media(max-width:600px){.pricing-grid{grid-template-columns:1fr;}}
.plan{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:32px;position:relative;overflow:hidden;
}
.plan.featured{border-color:var(--yellow);}
.plan.featured::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--yellow),#f97316);
}
.plan-badge{
  position:absolute;top:16px;right:16px;
  background:var(--yellow);color:#000;
  font-size:10px;font-weight:800;padding:3px 8px;
  border-radius:6px;letter-spacing:1px;
}
.plan-name{font-size:13px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.plan-price{font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:4px;}
.plan-price .curr{font-size:18px;vertical-align:top;padding-top:8px;display:inline-block;}
.plan-period{font-size:13px;color:var(--muted);margin-bottom:28px;}
.plan-features{list-style:none;margin-bottom:28px;display:flex;flex-direction:column;gap:10px;}
.plan-features li{font-size:14px;display:flex;align-items:center;gap:10px;}
.plan-features li .ic{font-size:14px;}
.plan-features li .on{color:var(--white);}
.plan-features li .off{color:var(--muted);}
.plan-btn-free{
  width:100%;padding:13px;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--white);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all 0.2s;
}
.plan-btn-free:hover{border-color:var(--white);}
.plan-btn-pro{
  width:100%;padding:13px;border-radius:10px;
  border:none;background:var(--yellow);
  color:#000;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all 0.2s;
}
.plan-btn-pro:hover{opacity:0.88;}

/* ═══════════════════════════════
   TESTIMONIALS
═══════════════════════════════ */
.testi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:60px;}
.testi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;}
.testi-stars{color:var(--yellow);font-size:14px;letter-spacing:3px;margin-bottom:14px;}
.testi-text{font-size:15px;color:#c0c0d0;line-height:1.7;margin-bottom:20px;font-style:italic;}
.testi-author{display:flex;align-items:center;gap:12px;}
.testi-avatar{
  width:40px;height:40px;border-radius:50%;
  background:rgba(247,223,30,0.1);border:1px solid rgba(247,223,30,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:var(--yellow);
}
.testi-name{font-size:14px;font-weight:700;}
.testi-role{font-size:12px;color:var(--muted);}

/* ═══════════════════════════════
   CTA SECTION
═══════════════════════════════ */
.cta-section{
  margin:0 20px 80px;
  background:linear-gradient(135deg,#13130e,#0c0c08);
  border:1px solid rgba(247,223,30,0.15);
  border-radius:20px;padding:60px 40px;text-align:center;
  position:relative;overflow:hidden;
  max-width:1060px;margin-left:auto;margin-right:auto;
}
.cta-section::before{
  content:'';position:absolute;
  top:-80px;left:50%;transform:translateX(-50%);
  width:300px;height:300px;border-radius:50%;
  background:rgba(247,223,30,0.06);
  filter:blur(60px);pointer-events:none;
}
.cta-section h2{font-size:clamp(28px,5vw,48px);font-weight:800;letter-spacing:-1.5px;margin-bottom:14px;}
.cta-section p{font-size:16px;color:var(--muted);margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.7;}
.cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

/* ═══════════════════════════════
   FOOTER
═══════════════════════════════ */
footer{
  border-top:1px solid var(--border);
  padding:40px 20px;max-width:1100px;margin:0 auto;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:16px;
}
.footer-logo{font-size:18px;font-weight:800;}
.footer-logo .js{color:var(--yellow);}
.footer-text{font-size:13px;color:var(--muted);}
.footer-flag{font-size:13px;color:var(--muted);}

/* ═══════════════════════════════
   MODALS & APP
═══════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.88);z-index:200;
  align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:32px;width:100%;max-width:420px;
  position:relative;
}
.modal-close{
  position:absolute;top:16px;right:16px;
  background:var(--dark);border:1px solid var(--border);
  color:var(--muted);width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;
}
.modal h3{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.field-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.field-input{
  width:100%;background:var(--dark);
  border:1px solid var(--border);border-radius:10px;
  color:var(--white);padding:13px 16px;
  font-size:15px;font-family:'Courier New',monospace;
  outline:none;margin-bottom:16px;
  transition:border-color 0.2s;letter-spacing:2px;text-align:center;
}
.field-input:focus{border-color:var(--yellow);}
.field-err{color:#f87171;font-size:12px;margin-bottom:12px;display:none;text-align:center;}
.field-err.show{display:block;}
.modal-btn{
  width:100%;padding:14px;border-radius:10px;border:none;
  background:var(--yellow);color:#000;
  font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;margin-bottom:10px;transition:opacity 0.2s;
}
.modal-btn:hover{opacity:0.88;}
.modal-btn-ghost{
  width:100%;padding:12px;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;
}
.modal-step{
  background:var(--dark);border-radius:10px;
  padding:12px 14px;margin-bottom:10px;
  font-size:13px;color:#c0c0d0;line-height:1.6;
  border-left:3px solid var(--yellow);
}
.modal-step strong{color:var(--yellow);}
.wp-btn{
  width:100%;padding:14px;border-radius:10px;border:none;
  background:#25d366;color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-bottom:10px;
}
.admin-small{text-align:center;font-size:11px;color:#1c1c28;cursor:pointer;margin-top:14px;}
.admin-small:hover{color:#444;}

/* APP */
#mainApp{display:none;min-height:100vh;}
.app-nav{
  position:sticky;top:0;z-index:50;
  background:rgba(5,5,7,0.95);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.app-nav-inner{
  max-width:900px;margin:0 auto;padding:0 20px;height:60px;
  display:flex;justify-content:space-between;align-items:center;
}
.app-logo{font-size:18px;font-weight:800;}
.app-logo .js{color:var(--yellow);}
.app-right{display:flex;align-items:center;gap:10px;}
.plan-chip{
  font-size:11px;font-weight:700;padding:4px 10px;
  border-radius:6px;letter-spacing:1px;
}
.chip-free{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.chip-pro{background:rgba(247,223,30,0.1);color:var(--yellow);border:1px solid rgba(247,223,30,0.2);}
.app-logout{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:6px 12px;border-radius:8px;
  font-size:12px;cursor:pointer;font-family:inherit;
}
.app-content{max-width:900px;margin:0 auto;padding:40px 20px;}
.app-hero{margin-bottom:40px;}
.app-hello{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
.app-hello span{color:var(--yellow);}
.app-sub{font-size:14px;color:var(--muted);}
.progress-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:24px;margin-bottom:32px;
}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.prog-title{font-size:15px;font-weight:700;}
.prog-pct{font-size:15px;font-weight:800;color:var(--yellow);}
.prog-bar{height:6px;background:var(--dark);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--yellow),#f97316);border-radius:3px;transition:width 0.6s;}
.prog-stats{display:flex;gap:20px;}
.prog-stat{font-size:13px;color:var(--muted);}
.prog-stat span{color:var(--white);font-weight:700;}
.modules-title{font-size:18px;font-weight:800;margin-bottom:16px;letter-spacing:-0.3px;}
.app-modules{display:flex;flex-direction:column;gap:10px;}
.app-mod{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:18px 20px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all 0.2s;
}
.app-mod:hover{border-color:rgba(247,223,30,0.3);transform:translateX(4px);}
.app-mod.locked{opacity:0.55;cursor:default;}
.app-mod.locked:hover{transform:none;border-color:var(--border);}
.mod-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.mod-info-wrap{flex:1;}
.mod-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.mod-meta{font-size:12px;color:var(--muted);}
.mod-done{font-size:12px;color:var(--green);font-weight:600;}

/* LESSON VIEW */
#lessonView{display:none;}
.lesson-nav{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.back-btn{
  background:var(--card);border:1px solid var(--border);
  color:var(--white);padding:9px 16px;border-radius:10px;
  font-size:13px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:6px;
  transition:border-color 0.2s;
}
.back-btn:hover{border-color:var(--yellow);}
.lesson-heading{font-size:20px;font-weight:800;letter-spacing:-0.3px;}
.lesson-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:24px;margin-bottom:16px;
}
